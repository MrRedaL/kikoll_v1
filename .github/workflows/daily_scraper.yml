name: Daily WeLoveBuzz Scraper

on:
  schedule:
    # S'exécute tous les jours à 8h00 du matin (Heure UTC)
    - cron: '0 8 * * *'
  workflow_dispatch: # Permet de déclencher le script manuellement depuis GitHub

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Requis pour pouvoir pousser les modifications (history.json)

    steps:
    - name: Récupération du code
      uses: actions/checkout@v3

    - name: Configuration de Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installation des dépendances
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Exécution du script
      run: python test.py
      
    - name: Sauvegarder l'historique
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        git add history.json || echo "Pas d'historique à ajouter"
        git commit -m "Mise à jour de l'historique des articles [skip ci]" || echo "Rien à commiter"
        git push || echo "Rien à push"
